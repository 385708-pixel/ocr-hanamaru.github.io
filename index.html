<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字リーダー (OCR)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script type="text/javascript">
        // ページが完全に読み込まれた後に実行し、InvalidStateErrorを防ぐ
        window.addEventListener('load', function() {
            if ('serviceWorker' in navigator && window.isSecureContext) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for (let registration of registrations) {
                        registration.unregister();
                        console.log('他アプリとの干渉を防ぐため、Service Workerを解除しました。');
                    }
                }).catch(function(err) {
                    // サンドボックス環境などではエラーになるため、警告に留める
                    console.warn('Service Workerの解除がスキップされました。環境によっては正常な動作です。', err.message);
                });
            }
        });
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 font-sans">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden p-6 space-y-6">
        <div class="flex justify-between items-center border-b pb-2">
            <h1 class="text-xl font-bold text-gray-800">数字リーダー (OCR)</h1>
        </div>

        <div class="relative">
            <label class="block text-sm font-medium text-gray-700 mb-1">📷 カメラ (枠内に数字を合わせてください)</label>
            <div id="cameraContainer" class="relative rounded-lg overflow-hidden bg-black aspect-[4/3] flex justify-center items-center">
                
                <div id="cameraOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-800 z-10">
                    <p class="text-white text-sm mb-4 text-center px-4">カメラを使用して数字を読み取ります。<br>アクセスを許可してください。</p>
                    <button id="startCameraBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transition-transform transform active:scale-95">
                        カメラを起動
                    </button>
                </div>

                <video id="video" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                
                <!-- 撮影の目安となるガイド枠 -->
                <div id="guideOverlay" class="absolute inset-0 pointer-events-none flex items-center justify-center hidden overflow-hidden">
                    <div class="w-[85%] h-[20%] border-2 border-green-500 flex items-center justify-center relative shadow-[0_0_0_9999px_rgba(0,0,0,0.6)]">
                        <div class="flex items-center text-green-500/80 text-xl font-bold font-mono tracking-[0.2em]">
                            <span class="invisible">000</span><span class="mx-1 mb-1">-</span><span class="invisible">000</span><span class="mx-1 mb-1">-</span><span class="invisible">0000</span>
                        </div>
                        <span class="absolute -top-6 left-0 right-0 text-center text-white text-xs font-bold drop-shadow">枠に合わせると自動で読み取ります</span>
                    </div>
                </div>
            </div>
            <canvas id="canvas" class="hidden"></canvas>
            
            <button id="captureBtn" class="mt-3 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition-colors flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                手動で撮影する
            </button>
        </div>

        <div>
            <label for="scanResult" class="block text-sm font-medium text-gray-700 mb-1">🔢 読み取り結果 (手修正可能)</label>
            <div class="flex">
                <input type="text" id="scanResult" placeholder="000-000-0000" maxlength="12"
                    class="block w-full border border-gray-300 bg-white rounded-l-md shadow-sm p-3 text-xl font-mono text-center focus:ring-blue-500 focus:border-blue-500">
                <button id="clearBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-600 px-4 rounded-r-md border border-l-0 border-gray-300 transition-colors">
                    クリア
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-1">※OCRは誤認識することがあります。必要に応じて手動で修正してください。</p>
        </div>

        <div class="space-y-2">
            <button id="sendBtn" disabled
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-4 rounded-lg shadow-md transition-colors flex justify-center items-center gap-2 text-lg">
                スプレッドシートに送信
            </button>
            <div id="statusMsg" class="text-center text-sm font-bold h-auto min-h-[1.5rem] text-gray-600"></div>
            <div id="ocrProgress" class="w-full bg-gray-200 rounded-full h-1.5 hidden mt-1">
                <div id="ocrProgressBar" class="bg-indigo-600 h-1.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', async () => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const captureBtn = document.getElementById('captureBtn');
            const scanResultInput = document.getElementById('scanResult');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            const ocrProgress = document.getElementById('ocrProgress');
            const ocrProgressBar = document.getElementById('ocrProgressBar');
            
            const startCameraBtn = document.getElementById('startCameraBtn');
            const cameraOverlay = document.getElementById('cameraOverlay');
            const guideOverlay = document.getElementById('guideOverlay');
            
            // ★ここにGAS WebアプリURLを設定してください★
            const gasUrl = "https://script.google.com/macros/s/AKfycbx31PCvA6hknuzRD-g2v6wfBd8lritJ2ktpS1k2jjKmHR2XNSPmgbpth2g2fSFnIairqQ/exec";

            let ocrWorker = null;
            let isWorkerReady = false;
            let isScanning = false;
            let isAutoScanningActive = false;

            async function prepareWorker() {
                try {
                    statusMsg.textContent = "OCRエンジンを準備中...";
                    statusMsg.className = "text-center text-xs font-bold text-gray-400";
                    
                    ocrWorker = await Tesseract.createWorker('eng', 1, {
                        logger: m => {
                            if (m.status === 'recognizing text' && !ocrProgress.classList.contains('hidden')) {
                                ocrProgressBar.style.width = `${m.progress * 100}%`;
                            }
                        }
                    });
                    
                    await ocrWorker.setParameters({
                        tessedit_char_whitelist: '0123456789-', 
                        tessedit_pageseg_mode: 7, 
                    });
                    
                    isWorkerReady = true;
                    statusMsg.textContent = "";
                    console.log("OCR Worker準備完了");
                } catch (err) {
                    console.error("Worker準備エラー:", err);
                }
            }
            prepareWorker();

            function preprocessImage(ctx, width, height) {
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                const threshold = 128; 

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
                    
                    const color = brightness > threshold ? 255 : 0;
                    data[i] = data[i + 1] = data[i + 2] = color;
                }
                ctx.putImageData(imageData, 0, 0);
            }

            const myLiffId = "2010662857-EkXbgMvQ"; 
            try {
                if (myLiffId !== "YOUR_LIFF_ID_HERE" && myLiffId !== "") {
                    await liff.init({ liffId: myLiffId });
                    console.log("LIFF初期化成功");
                }
            } catch (err) {
                console.error("LIFF初期化エラー:", err);
                statusMsg.innerHTML = "LINE連携の初期化に失敗しました。";
                statusMsg.className = "text-center text-sm font-bold h-auto mt-2 text-red-600";
            }

            // 手動入力時にハイフンを自動補完する処理
            scanResultInput.addEventListener('input', (e) => {
                let val = e.target.value.replace(/[^0-9]/g, '');
                
                let formatted = '';
                if (val.length > 0) {
                    formatted = val.substring(0, 3);
                }
                if (val.length > 3) {
                    formatted += '-' + val.substring(3, 6);
                }
                if (val.length > 6) {
                    formatted += '-' + val.substring(6, 10);
                }
                
                e.target.value = formatted;
                sendBtn.disabled = scanResultInput.value.trim() === "";
            });

            // --- 自動スキャンループ ---
            async function autoScanLoop() {
                if (!isAutoScanningActive) return;
                
                if (isWorkerReady && !video.classList.contains('hidden') && scanResultInput.value.trim() === "" && !isScanning) {
                    await performAutoScan(); 
                }
                
                if (isAutoScanningActive) {
                    setTimeout(autoScanLoop, 100);
                }
            }

            async function startCamera() {
                try {
                    startCameraBtn.textContent = "起動中...";
                    startCameraBtn.disabled = true;
                    statusMsg.innerHTML = "";

                    let stream;
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { 
                                facingMode: "environment", 
                                width: { ideal: 1280 }, 
                                height: { ideal: 720 },
                                advanced: [{ focusMode: "continuous" }] 
                            } 
                        });
                    } catch (e) {
                        console.warn("オートフォーカス指定がサポートされていないため、通常モードで起動します", e);
                        stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                        });
                    }
                    
                    video.srcObject = stream;
                    await video.play();
                    
                    video.classList.remove('hidden');
                    guideOverlay.classList.remove('hidden');
                    cameraOverlay.classList.add('hidden');
                    statusMsg.textContent = "";

                    isAutoScanningActive = true;
                    autoScanLoop();

                } catch (err) {
                    console.error("カメラの起動に失敗しました:", err);
                    startCameraBtn.textContent = "カメラを起動";
                    startCameraBtn.disabled = false;
                    
                    statusMsg.innerHTML = `
                        カメラのアクセスが拒否されています。<br>
                        <div class="mt-2 text-left bg-red-50 p-2 rounded border border-red-200 text-xs font-normal text-gray-700">
                            <strong>■ LINEアプリの場合:</strong><br>
                            スマホの「設定」アプリ ＞「LINE」＞「カメラ」をオンに変更してください。<br><br>
                            <strong>■ Safari (iPhone) の場合:</strong><br>
                            アドレスバー左の「ぁあ」をタップ ＞「Webサイトの設定」＞「カメラ」を「許可」に変更してリロード<br><br>
                            <strong>■ Chrome (Android) の場合:</strong><br>
                            アドレスバー左のアイコン（または右上の「⋮」＞設定＞サイトの設定）から「カメラ」を「許可」に変更してリロード
                        </div>
                    `;
                    statusMsg.className = "text-center text-sm font-bold h-auto mt-2 text-red-600";
                }
            }
            startCameraBtn.addEventListener('click', startCamera);

            // --- 自動スキャン用の処理（裏で動く） ---
            async function performAutoScan() {
                isScanning = true;
                statusMsg.textContent = "自動で数字を探しています...";
                statusMsg.className = "text-center text-sm font-bold text-gray-500 animate-pulse";

                const context = canvas.getContext('2d');
                const vw = video.videoWidth;
                const vh = video.videoHeight;
                
                const cropW = vw * 0.85;
                const cropH = vh * 0.20;
                const cropX = (vw - cropW) / 2;
                const cropY = (vh - cropH) / 2;
                const targetW = 600;
                const targetH = Math.floor(cropH * (targetW / cropW));

                canvas.width = targetW;
                canvas.height = targetH;
                context.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, targetW, targetH);
                preprocessImage(context, targetW, targetH);

                try {
                    const { data: { text } } = await ocrWorker.recognize(canvas);
                    
                    // 手動スキャンが割り込んで自動スキャンが止められていた場合は結果を捨てる
                    if (!isAutoScanningActive) return;

                    const cleanText = text.replace(/[^0-9\-]/g, ''); 
                    const numbersOnly = cleanText.replace(/\-/g, ''); 

                    if (numbersOnly.length === 10) {
                        const formattedText = `${numbersOnly.slice(0,3)}-${numbersOnly.slice(3,6)}-${numbersOnly.slice(6,10)}`;
                        scanResultInput.value = formattedText;
                        sendBtn.disabled = false;
                        statusMsg.textContent = "✅ 読み取り完了！";
                        statusMsg.className = "text-center text-sm font-bold text-green-600";
                        statusMsg.classList.remove('animate-pulse');
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                        
                        // 成功したので自動スキャンを停止
                        isAutoScanningActive = false;
                    }
                } catch (err) {
                    console.error("自動OCRエラー:", err);
                } finally {
                    isScanning = false;
                }
            }

            // --- 手動スキャン用の処理（優先度最高） ---
            async function performManualScan() {
                if (!video.srcObject || !isWorkerReady) return;

                // 1. 自動スキャンを即座に停止し、UIを更新
                isAutoScanningActive = false;
                captureBtn.disabled = true;
                statusMsg.textContent = "画像を解析中...";
                statusMsg.className = "text-center text-sm font-bold text-indigo-600";
                statusMsg.classList.remove('animate-pulse');
                ocrProgress.classList.remove('hidden');
                ocrProgressBar.style.width = '0%';

                // 2. 現在実行中の自動スキャンが終わるのを待つ（一瞬）
                while (isScanning) {
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                isScanning = true;

                // 3. 画像を切り抜いて解析
                const context = canvas.getContext('2d');
                const vw = video.videoWidth;
                const vh = video.videoHeight;
                const cropW = vw * 0.85;
                const cropH = vh * 0.20;
                const cropX = (vw - cropW) / 2;
                const cropY = (vh - cropH) / 2;
                const targetW = 600;
                const targetH = Math.floor(cropH * (targetW / cropW));

                canvas.width = targetW;
                canvas.height = targetH;
                context.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, targetW, targetH);
                preprocessImage(context, targetW, targetH);

                try {
                    const { data: { text } } = await ocrWorker.recognize(canvas);

                    const cleanText = text.replace(/[^0-9\-]/g, ''); 
                    const numbersOnly = cleanText.replace(/\-/g, ''); 
                    
                    let formattedText = cleanText;
                    let isSuccess = false;

                    if (numbersOnly.length === 10) {
                        formattedText = `${numbersOnly.slice(0,3)}-${numbersOnly.slice(3,6)}-${numbersOnly.slice(6,10)}`;
                        isSuccess = true;
                    }

                    if (isSuccess || formattedText) {
                        scanResultInput.value = formattedText;
                        sendBtn.disabled = false;
                        if(isSuccess) {
                            statusMsg.textContent = "✅ 読み取り完了！";
                            statusMsg.className = "text-center text-sm font-bold text-green-600";
                            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                        } else {
                            statusMsg.textContent = "⚠️ フォーマットと異なりますが読み取りました。修正してください。";
                            statusMsg.className = "text-center text-sm font-bold text-yellow-600";
                        }
                    } else {
                        statusMsg.textContent = "⚠️ 読み取れませんでした。枠に合わせて再度撮影してください。";
                        statusMsg.className = "text-center text-sm font-bold text-yellow-600";
                    }
                } catch (err) {
                    console.error("手動OCRエラー:", err);
                    statusMsg.textContent = "❌ 解析中にエラーが発生しました。";
                    statusMsg.className = "text-center text-sm font-bold text-red-600";
                } finally {
                    isScanning = false;
                    captureBtn.disabled = false;
                    setTimeout(() => { ocrProgress.classList.add('hidden'); }, 100);
                    
                    // 読み取りに失敗（空欄）の場合のみ、自動スキャンを再開
                    if (scanResultInput.value.trim() === "") {
                        isAutoScanningActive = true;
                        autoScanLoop();
                    }
                }
            }

            // 手動撮影ボタンのイベント
            captureBtn.addEventListener('click', () => {
                if (!video.srcObject) {
                    statusMsg.textContent = "先にカメラを起動してください。";
                    statusMsg.className = "text-center text-sm font-bold text-red-600";
                    return;
                }
                if (!isWorkerReady) {
                    statusMsg.textContent = "OCRエンジンの準備が終わっていません。数秒お待ちください。";
                    statusMsg.className = "text-center text-sm font-bold text-yellow-600";
                    return;
                }
                // 手動スキャン処理を呼び出し
                performManualScan(); 
            });

            clearBtn.addEventListener('click', () => {
                scanResultInput.value = "";
                sendBtn.disabled = true;
                statusMsg.textContent = "";
                
                // クリアされたら自動スキャンを再開する
                if (!isAutoScanningActive && !video.classList.contains('hidden')) {
                    isAutoScanningActive = true;
                    autoScanLoop();
                }
            });

            sendBtn.addEventListener('click', () => {
                const rawInput = scanResultInput.value.trim(); 
                
                // スプレッドシートに送信する際はハイフンを除外する
                const barcode = rawInput.replace(/-/g, '');

                if (!gasUrl || !gasUrl.startsWith('https://script.google.com/')) {
                    statusMsg.textContent = "❌ コード内のGAS URLを正しく設定してください。";
                    statusMsg.className = "text-center text-sm font-bold text-red-600";
                    return;
                }
                if (!barcode) return;

                sendBtn.disabled = true;
                statusMsg.textContent = "送信しています...";
                statusMsg.className = "text-center text-sm font-bold text-blue-600";

                const urlWithParams = `${gasUrl}?barcode=${encodeURIComponent(barcode)}`;

                fetch(urlWithParams, { method: 'GET', mode: 'no-cors' })
                .then(() => {
                    statusMsg.textContent = "✨ スプレッドシートに送信しました！";
                    statusMsg.className = "text-center text-sm font-bold text-green-600";
                    setTimeout(() => {
                        scanResultInput.value = "";
                        statusMsg.textContent = "";
                        
                        // 送信成功後も自動スキャンを再開する
                        if (!isAutoScanningActive && !video.classList.contains('hidden')) {
                            isAutoScanningActive = true;
                            autoScanLoop();
                        }
                    }, 3000);
                })
                .catch(error => {
                    console.error('送信エラー:', error);
                    statusMsg.textContent = "❌ 送信に失敗しました。";
                    statusMsg.className = "text-center text-sm font-bold text-red-600";
                    sendBtn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
