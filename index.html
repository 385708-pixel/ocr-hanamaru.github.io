!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字リーダー (OCR)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script type="text/javascript">
        // ページが完全に読み込まれた後に実行し、InvalidStateErrorを防ぐ
        window.addEventListener('load', function() {
            if ('serviceWorker' in navigator && window.isSecureContext) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for (let registration of registrations) {
                        registration.unregister();
                        console.log('他アプリとの干渉を防ぐため、Service Workerを解除しました。');
                    }
                }).catch(function(err) {
                    // サンドボックス環境などではエラーになるため、警告に留める
                    console.warn('Service Workerの解除がスキップされました。環境によっては正常な動作です。', err.message);
                });
            }
        });
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 font-sans">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden p-6 space-y-6">
        <div class="flex justify-between items-center border-b pb-2">
            <h1 class="text-xl font-bold text-gray-800">数字リーダー (OCR)</h1>
            <button id="openSettingsBtn" class="text-gray-500 hover:text-gray-800 transition-colors p-1" title="設定">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>

        <div class="relative">
            <label class="block text-sm font-medium text-gray-700 mb-1">📷 カメラ (枠内に数字を合わせてください)</label>
            <div id="cameraContainer" class="relative rounded-lg overflow-hidden bg-black aspect-[4/3] flex justify-center items-center">
                
                <div id="cameraOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-800 z-10">
                    <p class="text-white text-sm mb-4 text-center px-4">カメラを使用して数字を読み取ります。<br>アクセスを許可してください。</p>
                    <button id="startCameraBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transition-transform transform active:scale-95">
                        カメラを起動
                    </button>
                </div>

                <video id="video" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                
                <!-- 撮影の目安となるガイド枠 (3桁-3桁-4桁用に調整) -->
                <div id="guideOverlay" class="absolute inset-0 pointer-events-none flex items-center justify-center hidden overflow-hidden">
                    <!-- 周囲を暗くし、中央をくり抜くデザイン -->
                    <div class="w-[85%] h-[20%] border-2 border-green-500 flex items-center justify-center relative shadow-[0_0_0_9999px_rgba(0,0,0,0.6)]">
                        <div class="flex items-center text-green-500/80 text-xl font-bold font-mono tracking-[0.2em]">
                            <!-- 透明な文字で幅を確保し、ハイフンだけを表示する (scale-xで長さを2倍に) -->
                            <span class="invisible">000</span><span class="mx-3 mb-1 transform scale-x-[2] inline-block">-</span><span class="invisible">000</span><span class="mx-3 mb-1 transform scale-x-[2] inline-block">-</span><span class="invisible">0000</span>
                        </div>
                        <span class="absolute -top-6 left-0 right-0 text-center text-white text-xs font-bold drop-shadow">枠に合わせると自動で読み取ります</span>
                    </div>
                </div>
            </div>
            <!-- デバッグや処理内容を確認したい場合は hidden を外すとプレビューが見れます -->
            <canvas id="canvas" class="hidden"></canvas>
            
            <button id="captureBtn" class="mt-3 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition-colors flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                手動で撮影する
            </button>
        </div>

        <div>
            <label for="scanResult" class="block text-sm font-medium text-gray-700 mb-1">🔢 読み取り結果 (手修正可能)</label>
            <div class="flex">
                <input type="text" id="scanResult" placeholder="000-000-0000" 
                    class="block w-full border border-gray-300 bg-white rounded-l-md shadow-sm p-3 text-xl font-mono text-center focus:ring-blue-500 focus:border-blue-500">
                <button id="clearBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-600 px-4 rounded-r-md border border-l-0 border-gray-300 transition-colors">
                    クリア
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-1">※OCRは誤認識することがあります。必要に応じて手動で修正してください。</p>
        </div>

        <div class="space-y-2">
            <button id="sendBtn" disabled
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-4 rounded-lg shadow-md transition-colors flex justify-center items-center gap-2 text-lg">
                スプレッドシートに送信
            </button>
            <div id="statusMsg" class="text-center text-sm font-bold h-auto min-h-[1.5rem] text-gray-600"></div>
            <!-- OCRの進捗表示用 (高速化したため一瞬で終わる可能性があります) -->
            <div id="ocrProgress" class="w-full bg-gray-200 rounded-full h-1.5 hidden mt-1">
                <div id="ocrProgressBar" class="bg-indigo-600 h-1.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl p-6 w-11/12 max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-gray-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                設定
            </h2>
            <div class="mb-6">
                <label for="gasUrl" class="block text-sm font-bold text-gray-700 mb-2">⚙️ GAS WebアプリURL (必須)</label>
                <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" 
                    class="w-full border border-gray-300 rounded-md p-3 text-sm focus:ring-blue-500 focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-2">スプレッドシート連携用のURLを入力してください。</p>
            </div>
            <div class="flex justify-end gap-3">
                <button id="closeSettingsBtn" class="px-5 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg font-medium transition-colors">キャンセル</button>
                <button id="saveSettingsBtn" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-colors">保存する</button>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', async () => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const captureBtn = document.getElementById('captureBtn');
            const scanResultInput = document.getElementById('scanResult');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            const gasUrlInput = document.getElementById('gasUrl');
            const ocrProgress = document.getElementById('ocrProgress');
            const ocrProgressBar = document.getElementById('ocrProgressBar');
            
            const startCameraBtn = document.getElementById('startCameraBtn');
            const cameraOverlay = document.getElementById('cameraOverlay');
            const guideOverlay = document.getElementById('guideOverlay');

            // モーダル関連の要素
            const settingsModal = document.getElementById('settingsModal');
            const openSettingsBtn = document.getElementById('openSettingsBtn');
            const closeSettingsBtn = document.getElementById('closeSettingsBtn');
            const saveSettingsBtn = document.getElementById('saveSettingsBtn');
            
            // 現在のGAS URLを保持
            let currentGasUrl = localStorage.getItem('ocrScannerGasUrl') || "";

            // --- 高速化: Tesseract Workerの事前準備 ---
            let ocrWorker = null;
            let isWorkerReady = false;
            let isScanning = false;
            let isAutoScanningActive = false;

            async function prepareWorker() {
                try {
                    statusMsg.textContent = "OCRエンジンを準備中...";
                    statusMsg.className = "text-center text-xs font-bold text-gray-400";
                    
                    ocrWorker = await Tesseract.createWorker('eng', 1, {
                        logger: m => {
                            // 手動スキャン時（プログレスバーが表示されている時）のみプログレスバーを更新
                            if (m.status === 'recognizing text' && !ocrProgress.classList.contains('hidden')) {
                                ocrProgressBar.style.width = `${m.progress * 100}%`;
                            }
                        }
                    });
                    
                    // 精度向上のための設定
                    await ocrWorker.setParameters({
                        tessedit_char_whitelist: '0123456789-', // 数字とハイフンのみ許可
                        tessedit_pageseg_mode: 7, // (Treat the image as a single text line) 1行として認識
                    });
                    
                    isWorkerReady = true;
                    statusMsg.textContent = "";
                    console.log("OCR Worker準備完了");
                } catch (err) {
                    console.error("Worker準備エラー:", err);
                }
            }
            // ページロード時に裏側で準備を開始
            prepareWorker();

            // --- 画像前処理（二値化・グレースケール化） ---
            function preprocessImage(ctx, width, height) {
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                const threshold = 128; // 白黒に分ける閾値（必要に応じて調整）

                for (let i = 0; i < data.length; i += 4) {
                    // RGBから輝度（明るさ）を計算
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
                    
                    // 閾値を超えれば白（255）、それ以外は黒（0）にして文字を際立たせる
                    const color = brightness > threshold ? 255 : 0;
                    data[i] = data[i + 1] = data[i + 2] = color;
                    // alpha(data[i+3])はそのまま
                }
                ctx.putImageData(imageData, 0, 0);
            }

            // --- LIFF (LINE連携) の初期化 ---
            const myLiffId = "2010662857-EkXbgMvQ"; 
            try {
                if (myLiffId !== "YOUR_LIFF_ID_HERE" && myLiffId !== "") {
                    await liff.init({ liffId: myLiffId });
                    console.log("LIFF初期化成功");
                }
            } catch (err) {
                console.error("LIFF初期化エラー:", err);
                statusMsg.innerHTML = "LINE連携の初期化に失敗しました。";
                statusMsg.className = "text-center text-sm font-bold h-auto mt-2 text-red-600";
            }

            // --- 設定モーダルの制御 ---
            openSettingsBtn.addEventListener('click', () => {
                gasUrlInput.value = currentGasUrl;
                settingsModal.classList.remove('hidden');
            });
            
            closeSettingsBtn.addEventListener('click', () => {
                settingsModal.classList.add('hidden');
            });
            
            saveSettingsBtn.addEventListener('click', () => {
                currentGasUrl = gasUrlInput.value.trim();
                localStorage.setItem('ocrScannerGasUrl', currentGasUrl);
                settingsModal.classList.add('hidden');
                
                statusMsg.textContent = "設定を保存しました。";
                statusMsg.className = "text-center text-sm font-bold text-green-600";
                setTimeout(() => { 
                    if (statusMsg.textContent === "設定を保存しました。") statusMsg.textContent = ""; 
                }, 3000);
            });

            // インプットに値があるか監視して送信ボタンを有効化
            scanResultInput.addEventListener('input', () => {
                sendBtn.disabled = scanResultInput.value.trim() === "";
            });

            // --- 自動読み取りのループ処理 ---
            async function autoScanLoop() {
                if (!isAutoScanningActive) return;
                
                // スキャン実行条件: 準備完了 ＆ カメラ表示中 ＆ 結果が空 ＆ 現在スキャン中でない
                if (isWorkerReady && !video.classList.contains('hidden') && scanResultInput.value.trim() === "" && !isScanning) {
                    await performScan(true); // isAuto = true
                }
                
                // スキャン間隔を 1000ms から 100ms に短縮（体感速度の大幅アップ）
                setTimeout(autoScanLoop, 100);
            }

            // --- カメラの起動 ---
            async function startCamera() {
                try {
                    startCameraBtn.textContent = "起動中...";
                    startCameraBtn.disabled = true;
                    statusMsg.innerHTML = "";

                    let stream;
                    try {
                        // 1. オートフォーカス（continuous）を優先してカメラを起動する
                        stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { 
                                facingMode: "environment", 
                                width: { ideal: 1280 }, 
                                height: { ideal: 720 },
                                advanced: [{ focusMode: "continuous" }] 
                            } 
                        });
                    } catch (e) {
                        // 2. ブラウザが高度な設定に対応していない場合は通常のカメラ起動にフォールバック
                        console.warn("オートフォーカス指定がサポートされていないため、通常モードで起動します", e);
                        stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                        });
                    }
                    
                    video.srcObject = stream;
                    await video.play();
                    
                    video.classList.remove('hidden');
                    guideOverlay.classList.remove('hidden');
                    cameraOverlay.classList.add('hidden');
                    statusMsg.textContent = "";

                    // カメラ起動成功後に自動読み取りループを開始
                    isAutoScanningActive = true;
                    autoScanLoop();

                } catch (err) {
                    console.error("カメラの起動に失敗しました:", err);
                    startCameraBtn.textContent = "カメラを起動";
                    startCameraBtn.disabled = false;
                    
                    statusMsg.innerHTML = `
                        カメラのアクセスが拒否されています。<br>
                        <div class="mt-2 text-left bg-red-50 p-2 rounded border border-red-200 text-xs font-normal text-gray-700">
                            <strong>■ LINEアプリの場合:</strong><br>
                            スマホの「設定」アプリ ＞「LINE」＞「カメラ」をオンに変更してください。<br><br>
                            <strong>■ Safari (iPhone) の場合:</strong><br>
                            アドレスバー左の「ぁあ」をタップ ＞「Webサイトの設定」＞「カメラ」を「許可」に変更してリロード<br><br>
                            <strong>■ Chrome (Android) の場合:</strong><br>
                            アドレスバー左のアイコン（または右上の「⋮」＞設定＞サイトの設定）から「カメラ」を「許可」に変更してリロード
                        </div>
                    `;
                    statusMsg.className = "text-center text-sm font-bold h-auto mt-2 text-red-600";
                }
            }
            startCameraBtn.addEventListener('click', startCamera);

            // --- 画像の撮影とOCR実行 (共通関数) ---
            async function performScan(isAuto = false) {
                if (isScanning || !video.srcObject || !isWorkerReady) return;

                isScanning = true;

                if (!isAuto) {
                    // 手動スキャン時のUI更新
                    captureBtn.disabled = true;
                    statusMsg.textContent = "画像を解析中...";
                    statusMsg.className = "text-center text-sm font-bold text-indigo-600";
                    ocrProgress.classList.remove('hidden');
                    ocrProgressBar.style.width = '0%';
                } else {
                    // 自動スキャン時のUI更新
                    statusMsg.textContent = "自動で数字を探しています...";
                    statusMsg.className = "text-center text-sm font-bold text-gray-500 animate-pulse";
                }

                const context = canvas.getContext('2d');
                const vw = video.videoWidth;
                const vh = video.videoHeight;
                
                // ガイド枠に合わせて、動画の中央部分（幅85%、高さ20%）だけを切り抜く
                const cropW = vw * 0.85;
                const cropH = vh * 0.20;
                const cropX = (vw - cropW) / 2;
                const cropY = (vh - cropH) / 2;

                // 速度向上のため、解析用のCanvasサイズを横幅400pxに最適化して縮小する
                const targetW = 400;
                const targetH = Math.floor(cropH * (targetW / cropW));

                canvas.width = targetW;
                canvas.height = targetH;
                
                // 切り抜いた部分を縮小してCanvasへ描画
                context.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, targetW, targetH);

                // 精度向上のため、Canvasに描画された画像を白黒二値化処理する
                preprocessImage(context, targetW, targetH);

                try {
                    const { data: { text } } = await ocrWorker.recognize(canvas);

                    // 認識結果の整形処理
                    const cleanText = text.replace(/[^0-9\-]/g, ''); 
                    const numbersOnly = cleanText.replace(/\-/g, ''); 
                    
                    let formattedText = cleanText;
                    let isSuccess = false;

                    // 数字がちょうど10桁読み取れた場合は成功とする
                    if (numbersOnly.length === 10) {
                        formattedText = `${numbersOnly.slice(0,3)}-${numbersOnly.slice(3,6)}-${numbersOnly.slice(6,10)}`;
                        isSuccess = true;
                    }

                    if (isSuccess) {
                        scanResultInput.value = formattedText;
                        sendBtn.disabled = false;
                        statusMsg.textContent = "✅ 読み取り完了！";
                        statusMsg.className = "text-center text-sm font-bold text-green-600";
                        statusMsg.classList.remove('animate-pulse');
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // 成功時はバイブレーション
                    } else if (!isAuto) {
                        // 手動スキャンの時だけ、10桁じゃなくても強制的にInputに入れる
                        if (formattedText) {
                            scanResultInput.value = formattedText;
                            sendBtn.disabled = false;
                            statusMsg.textContent = "⚠️ フォーマットと異なりますが読み取りました。修正してください。";
                            statusMsg.className = "text-center text-sm font-bold text-yellow-600";
                        } else {
                            statusMsg.textContent = "⚠️ 読み取れませんでした。枠に合わせて再度撮影してください。";
                            statusMsg.className = "text-center text-sm font-bold text-yellow-600";
                        }
                        statusMsg.classList.remove('animate-pulse');
                    }

                } catch (err) {
                    console.error("OCRエラー:", err);
                    if (!isAuto) {
                        statusMsg.textContent = "❌ 解析中にエラーが発生しました。";
                        statusMsg.className = "text-center text-sm font-bold text-red-600";
                        statusMsg.classList.remove('animate-pulse');
                    }
                } finally {
                    isScanning = false;
                    if (!isAuto) {
                        captureBtn.disabled = false;
                        setTimeout(() => { ocrProgress.classList.add('hidden'); }, 1000);
                    }
                }
            }

            // 手動撮影ボタンの処理
            captureBtn.addEventListener('click', () => {
                if (!video.srcObject) {
                    statusMsg.textContent = "先にカメラを起動してください。";
                    statusMsg.className = "text-center text-sm font-bold text-red-600";
                    return;
                }
                if (!isWorkerReady) {
                    statusMsg.textContent = "OCRエンジンの準備が終わっていません。数秒お待ちください。";
                    statusMsg.className = "text-center text-sm font-bold text-yellow-600";
                    return;
                }
                performScan(false); // 手動スキャンを実行
            });

            // --- クリアボタンの処理 ---
            clearBtn.addEventListener('click', () => {
                scanResultInput.value = "";
                sendBtn.disabled = true;
                statusMsg.textContent = "";
                // 値が空になったので、次の自動読み取りループが再開される
            });

            // --- GASへの送信処理 ---
            sendBtn.addEventListener('click', () => {
                const gasUrl = currentGasUrl; 
                const barcode = scanResultInput.value.trim(); 

                if (!gasUrl || !gasUrl.startsWith('https://script.google.com/')) {
                    statusMsg.textContent = "❌ 右上の歯車アイコンからGASのURLを設定してください。";
                    statusMsg.className = "text-center text-sm font-bold text-red-600";
                    return;
                }
                if (!barcode) return;

                sendBtn.disabled = true;
                statusMsg.textContent = "送信しています...";
                statusMsg.className = "text-center text-sm font-bold text-blue-600";

                const urlWithParams = `${gasUrl}?barcode=${encodeURIComponent(barcode)}`;

                fetch(urlWithParams, { method: 'GET', mode: 'no-cors' })
                .then(() => {
                    statusMsg.textContent = "✨ スプレッドシートに送信しました！";
                    statusMsg.className = "text-center text-sm font-bold text-green-600";
                    setTimeout(() => {
                        scanResultInput.value = "";
                        statusMsg.textContent = "";
                    }, 3000);
                })
                .catch(error => {
                    console.error('送信エラー:', error);
                    statusMsg.textContent = "❌ 送信に失敗しました。";
                    statusMsg.className = "text-center text-sm font-bold text-red-600";
                    sendBtn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
